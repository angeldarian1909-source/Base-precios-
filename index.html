<script>

let sessionTimeout;
const SESSION_TIME = 15 * 60 * 1000;

function iniciarSesion() {

  const correo = document.getElementById("correo").value;
  const password = document.getElementById("password").value;

  if (!correo || !password) {
    alert("Ingresa correo y contraseña");
    return;
  }

  localStorage.setItem("usuario", correo);

  cargarApp();
}

function cerrarSesion() {

  localStorage.removeItem("usuario");
  location.reload();

}

function cargarApp() {

  document.getElementById("login").style.display = "none";
  document.getElementById("app").style.display = "block";

  resetTimer();
}

function verificarSesion() {

  const usuario = localStorage.getItem("usuario");

  if (usuario) {

    cargarApp();

  } else {

    document.getElementById("login").style.display = "block";
    document.getElementById("app").style.display = "none";

  }

}

function resetTimer() {

  clearTimeout(sessionTimeout);

  sessionTimeout = setTimeout(() => {

    alert("Sesión cerrada por inactividad");
    cerrarSesion();

  }, SESSION_TIME);

}

document.onload = verificarSesion;
document.onmousemove = resetTimer;
document.onkeypress = resetTimer;
document.onclick = resetTimer;



async function enviarIA(contenido) {

  try {

    const response = await fetch("/api/chat", {

      method: "POST",

      headers: {
        "Content-Type": "application/json"
      },

      body: JSON.stringify({
        content: contenido
      })

    });

    const data = await response.json();

    return data;

  } catch (error) {

    console.error("Error IA:", error);

    alert("Error procesando documento");

  }

}



async function escanearDocumento() {

  const archivo = document.getElementById("fileInput").files[0];

  if (!archivo) {
    alert("Selecciona un archivo");
    return;
  }

  const reader = new FileReader();

  reader.onload = async function(e) {

    const base64 = e.target.result;

    const resultado = await enviarIA(base64);

    console.log(resultado);

    alert("Documento procesado");

  };

  reader.readAsDataURL(archivo);

}

</script>
