// API call - routes through proxy if on Vercel, direct otherwise
async function extractFromFile(b64, mediaType) {
var disc = DISC.map(function(d){ return d.id; }).join(”, “);
var prompt = “Eres un asistente especializado en construccion en Mexico. Analiza esta cotizacion y extrae TODOS los materiales con sus precios unitarios. Para cada item devuelve JSON con: nombre, disciplina (uno de: “ + disc + “), subpartida, unidad, precio (numero, precio UNITARIO), proveedor, fecha (YYYY-MM-DD), notas, estado, ciudad. IMPORTANTE: extrae solo filas con descripcion y precio unitario. Ignora totales e IVA. Responde UNICAMENTE con array JSON valido. Si no hay materiales: []”;

var content = mediaType.startsWith(“image/”)
? [{type:“image”,source:{type:“base64”,media_type:mediaType,data:b64}},{type:“text”,text:prompt}]
: [{type:“document”,source:{type:“base64”,media_type:“application/pdf”,data:b64}},{type:“text”,text:prompt}];

// Try proxy first (Vercel), then direct
var useProxy = true;

var res;
if (useProxy) {
res = await fetch(”/api/chat”, {
method: “POST”,
headers: {“Content-Type”:“application/json”},
body: JSON.stringify({content: content})
});
} else {
res = await fetch(ANTHROPIC_API, {
method: “POST”,
headers: {
“Content-Type”: “application/json”,
“x-api-key”: API_KEY,
“anthropic-version”: “2023-06-01”,
“anthropic-dangerous-direct-browser-access”: “true”
},
body: JSON.stringify({model:“claude-opus-4-5”,max_tokens:2048,messages:[{role:“user”,content:content}]})
});
}

if (!res.ok) {
var e = await res.json().catch(function(){ return {}; });
throw new Error((e.error && e.error.message) || “Error “ + res.status);
}
var data = await res.json();
var raw = (data.content || []).map(function(b){ return b.text || “”; }).join(””).trim();
var match = raw.match(/[[\s\S]*]/);
if (!match) throw new Error(“No se encontraron materiales. Intenta con imagen mas clara.”);
var parsed;
try { parsed = JSON.parse(match[0]); } catch(e) { parsed = JSON.parse(match[0].replace(/,(\s*[}]])/g,”$1”)); }
return parsed.map(function(x){
return {
nombre: String(x.nombre || “Sin nombre”),
disciplina: DISC.find(function(d){ return d.id === x.disciplina; }) ? x.disciplina : “consumibles”,
subpartida: String(x.subpartida || “”),
unidad: String(x.unidad || “pza”),
precio: Number(String(x.precio || “0”).replace(/[,$]/g,””)) || 0,
proveedor: String(x.proveedor || “”),
fecha: String(x.fecha || today()),
notas: String(x.notas || “”),
estado: String(x.estado || “”),
ciudad: String(x.ciudad || “”),
};
});
}

// DOM helpers
function h(tag, attrs) {
var children = Array.prototype.slice.call(arguments, 2);
var el = document.createElement(tag);
if (attrs) {
Object.keys(attrs).forEach(function(k) {
var v = attrs[k];
if (k === “class”) el.className = v;
else if (k.startsWith(“on”)) el[k.toLowerCase()] = v;
else if (k === “style” && typeof v === “object”) Object.assign(el.style, v);
else if (k === “checked” && tag === “input”) el.checked = v;
else if (v !== null && v !== undefined && v !== false) el.setAttribute(k, v);
});
}
children.flat(Infinity).forEach(function(c) {
if (c == null || c === false) return;
el.appendChild(typeof c === “string” ? document.createTextNode(c) : c);
});
return el;
}
function div(a) { return h.apply(null, [“div”].concat(Array.prototype.slice.call(arguments))); }
function p(a) { return h.apply(null, [“p”].concat(Array.prototype.slice.call(arguments))); }
function span(a) { return h.apply(null, [“span”].concat(Array.prototype.slice.call(arguments))); }
function btn(a) { return h.apply(null, [“button”].concat(Array.prototype.slice.call(arguments))); }
function inp(a) { return h(“input”, a); }
function sel(a) { return h.apply(null, [“select”].concat(Array.prototype.slice.call(arguments))); }
function opt(v, t, selected) { return h(“option”, Object.assign({value:v}, selected ? {selected:“selected”} : {}), t); }
function ta(a) { return h.apply(null, [“textarea”].concat(Array.prototype.slice.call(arguments))); }
function lbl(a) { return h.apply(null, [“label”].concat(Array.prototype.slice.call(arguments))); }

function makeInp(attrs) { return inp(Object.assign({class:“inp”}, attrs || {})); }

function makeSelect(val, options, onChange) {
var el = sel({class:“inp”, onchange: function(e){ onChange(e.target.value); }});
options.forEach(function(o){ el.appendChild(opt(o[0], o[1], o[0] === val)); });
return el;
}
function makeLabel(text) { return lbl({class:“fl”}, text); }

function checkbox(checked) {
return div({class:“checkbox” + (checked ? “ checked” : “”)},
checked ? span({style:{color:“white”,fontSize:“13px”,fontWeight:“700”,lineHeight:“1”}}, “\u2713”) : “”
);
}

function ageBadge(item) {
var age = getAge(item.fechaSubida, item.fechaActualizacion);
return span({class:“age-badge”,style:{background:age.bg,color:age.color}}, age.icon + “ “ + age.label);
}

function discBadge(d) {
return d ? span({class:“disc-badge”,style:{background:d.bg,color:d.color}}, d.label) : span({}, “”);
}

function score(item, q) {
if (!q) return 1;
var ql = q.toLowerCase();
var s = 0;
if (item.nombre.toLowerCase().startsWith(ql)) s += 10;
else if (item.nombre.toLowerCase().includes(ql)) s += 6;
if ((item.subpartida || “”).toLowerCase().includes(ql)) s += 4;
if ((item.proveedor || “”).toLowerCase().includes(ql)) s += 2;
if ((item.estado || “”).toLowerCase().includes(ql)) s += 2;
if ((item.ciudad || “”).toLowerCase().includes(ql)) s += 2;
if ((item.notas || “”).toLowerCase().includes(ql)) s += 1;
var d = DISC.find(function(x){ return x.id === item.disciplina; });
if (d && d.label.toLowerCase().includes(ql)) s += 3;
return s;
}

function ageFilter(item) {
if (S.filterAge === “all”) return true;
var a = getAge(item.fechaSubida, item.fechaActualizacion);
if (S.filterAge === “verde”)    return a.months !== null && a.months < 6;
if (S.filterAge === “amarillo”) return a.months !== null && a.months >= 6 && a.months < 12;
if (S.filterAge === “naranja”)  return a.months !== null && a.months >= 12 && a.months < 18;
if (S.filterAge === “rojo”)     return a.months !== null && a.months >= 18;
return true;
}

function getFiltered() {
return S.items

function getEffPct(ci) {
if (S.pctMode === “global”) return Number(S.globalPct) || 0;
if (S.pctMode === “individual”) return Number(ci.pct) || 0;
var g = S.cotGroups.find(function(g){ return g.id === ci.groupId; });
return Number(g && g.pct) || 0;
}

function getResumenRows() {
return S.cotItems.map(function(ci){
var item = S.items.find(function(i){ return i.id === ci.itemId; });
if (!item) return null;
var cant = Number(ci.cantidad) || 1;
var pct = getEffPct(ci);
var precioU = Number(item.precio) || 0;
var subtot = precioU * cant;
var utilU = precioU * (pct / 100);
var totalU = precioU + utilU;
var utilTot = utilU * cant;
var totalTot = totalU * cant;
return {item:item,ci:ci,cant:cant,pct:pct,precioU:precioU,subtot:subtot,utilU:utilU,totalU:totalU,utilTot:utilTot,totalTot:totalTot};
}).filter(Boolean);
}

// Highlight matching text in a string
function highlightText(text, query) {
if (!query) return document.createTextNode(text);
var idx = text.toLowerCase().indexOf(query.toLowerCase());
if (idx === -1) return document.createTextNode(text);
var frag = document.createDocumentFragment();
if (idx > 0) frag.appendChild(document.createTextNode(text.slice(0, idx)));
var mark = h(“mark”, {style:{background:”#FEF08A”,color:”#1E293B”,borderRadius:“3px”,padding:“0 2px”}}, text.slice(idx, idx+query.length));
frag.appendChild(mark);
if (idx + query.length < text.length) frag.appendChild(document.createTextNode(text.slice(idx+query.length)));
return frag;
}
