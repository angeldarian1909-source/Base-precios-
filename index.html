<body>
<div id="app"></div>
<script>
const API_KEY = "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";
const STORAGE_KEY = "precios_v5";

const DISC = [
{id:“tornilleria”,label:“Tornillería / Ferretería”,color:”#F59E0B”,bg:”#FEF3C7”,icon:“🔩”},
{id:“electricidad”,label:“Electricidad”,color:”#3B82F6”,bg:”#DBEAFE”,icon:“⚡”},
{id:“plomeria”,label:“Plomería / Hidráulica”,color:”#06B6D4”,bg:”#CFFAFE”,icon:“🔧”},
{id:“estructura”,label:“Estructura / Acero”,color:”#64748B”,bg:”#F1F5F9”,icon:“🏗️”},
{id:“civil”,label:“Civil”,color:”#92400E”,bg:”#FEF3C7”,icon:“🧱”},
{id:“tuberias”,label:“Tuberías”,color:”#10B981”,bg:”#D1FAE5”,icon:“🔄”},
{id:“herreria”,label:“Herrería”,color:”#7C3AED”,bg:”#EDE9FE”,icon:“⚒️”},
{id:“consumibles”,label:“Consumibles”,color:”#EC4899”,bg:”#FCE7F3”,icon:“📦”},
];
const ESTADOS = [“Aguascalientes”,“Baja California”,“Baja California Sur”,“Campeche”,“Chiapas”,“Chihuahua”,“Ciudad de México”,“Coahuila”,“Colima”,“Durango”,“Guanajuato”,“Guerrero”,“Hidalgo”,“Jalisco”,“México”,“Michoacán”,“Morelos”,“Nayarit”,“Nuevo León”,“Oaxaca”,“Puebla”,“Querétaro”,“Quintana Roo”,“San Luis Potosí”,“Sinaloa”,“Sonora”,“Tabasco”,“Tamaulipas”,“Tlaxcala”,“Veracruz”,“Yucatán”,“Zacatecas”];
const UNIDADES = [“pza”,“ml”,“m”,“m²”,“m³”,“kg”,“ton”,“lt”,“rollo”,“caja”,“par”,“juego”,“tramo”,“varilla”,“bulto”];

const genId = () => Date.now()+”-”+Math.random().toString(36).slice(2,7);
const today = () => new Date().toISOString().slice(0,10);
const fmt   = v => Number(v).toLocaleString(“es-MX”,{style:“currency”,currency:“MXN”,minimumFractionDigits:2});
const getDisc = id => DISC.find(d=>d.id===id);

function getAge(subida, act) {
const ref = act || subida;
if (!ref) return {color:”#94A3B8”,bg:”#F1F5F9”,label:“Sin fecha”,icon:“⚪”,months:null};
const m = Math.floor((Date.now()-new Date(ref))/(1000*60*60*24*30.44));
if (m<6)  return {color:”#059669”,bg:”#D1FAE5”,label:m+“m”,icon:“🟢”,months:m};
if (m<12) return {color:”#D97706”,bg:”#FEF3C7”,label:m+“m”,icon:“🟡”,months:m};
if (m<18) return {color:”#EA580C”,bg:”#FFEDD5”,label:m+“m ⚠️”,icon:“🟠”,months:m};
return {color:”#DC2626”,bg:”#FEE2E2”,label:m+“m — Actualizar”,icon:“🔴”,months:m};
}

function loadItems() { try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||”[]”);}catch{return[];} }
function saveItems(arr) { try{localStorage.setItem(STORAGE_KEY,JSON.stringify(arr));}catch{} }

// ── State ──
let S = {
items: loadItems(),
view: “catalogo”,
search: “”, filterDisc: “all”, filterAge: “all”, sortBy: “nombre”,
toast: null, toastTimer: null,
confirmDel: null,
editItem: null,
form: emptyForm(),
// scan
scanStep: “idle”, scanPreview: null, scanResults: [], scanSel: {}, scanEdits: {}, scanErr: “”, scanLoc: {estado:””,ciudad:””},
// cotizacion
cotView: “select”, cotItems: [], cotGroups: [{id:“g1”,nombre:“Grupo 1”,pct:“30”}],
globalPct: “30”, pctMode: “global”, cotNombre: “”, cotCliente: “”,
cotSearch: “”, cotFilterDisc: “all”,
// quick edit
quickEditId: null, quickEditVal: “”,
};

function emptyForm() {
return {nombre:””,disciplina:””,subpartida:””,unidad:“pza”,precio:””,proveedor:””,fecha:today(),notas:””,estado:””,ciudad:””};
}

function setState(patch) { Object.assign(S,patch); render(); }
function persist(items) { S.items=items; saveItems(items); render(); }

function showToast(msg,type=“ok”) {
if (S.toastTimer) clearTimeout(S.toastTimer);
const bg = type===“err”?”#EF4444”:type===“info”?”#64748B”:”#10B981”;
S.toast={msg,bg}; S.toastTimer=setTimeout(()=>{S.toast=null;render();},3200); render();
}

// ── API call ──
async function extractFromFile(b64, mediaType) {
const disc = DISC.map(d=>d.id).join(”, “);
const prompt = `Eres un asistente especializado en construcción en México. Analiza esta cotización y extrae TODOS los materiales con sus precios unitarios. Para cada ítem devuelve JSON con: nombre, disciplina (uno de: ${disc}), subpartida, unidad, precio (número, precio UNITARIO), proveedor, fecha (YYYY-MM-DD), notas, estado, ciudad. IMPORTANTE: extrae solo filas con descripción y precio unitario. Ignora totales e IVA. Responde ÚNICAMENTE con array JSON válido. Si no hay materiales: []`;

const content = mediaType.startsWith(“image/”)
? [{type:“image”,source:{type:“base64”,media_type:mediaType,data:b64}},{type:“text”,text:prompt}]
: [{type:“document”,source:{type:“base64”,media_type:“application/pdf”,data:b64}},{type:“text”,text:prompt}];

const res = await fetch(“https://api.anthropic.com/v1/messages”,{
method:“POST”,
headers:{“Content-Type”:“application/json”,“x-api-key”:API_KEY,“anthropic-version”:“2023-06-01”,“anthropic-dangerous-direct-browser-access”:“true”},
body: JSON.stringify({model:“claude-opus-4-5”,max_tokens:2048,messages:[{role:“user”,content}]})
});
if (!res.ok) { const e=await res.json().catch(()=>({})); throw new Error(e.error?.message||“Error “+res.status); }
const data = await res.json();
const raw = (data.content||[]).map(b=>b.text||””).join(””).trim();
const match = raw.match(/[[\s\S]*]/);
if (!match) throw new Error(“No se encontraron materiales. Intenta con imagen más clara.”);
let parsed;
try { parsed=JSON.parse(match[0]); } catch { parsed=JSON.parse(match[0].replace(/,(\s*[}]])/g,”$1”)); }
return parsed.map(x=>({
nombre:String(x.nombre||“Sin nombre”),
disciplina:DISC.find(d=>d.id===x.disciplina)?x.disciplina:“consumibles”,
subpartida:String(x.subpartida||””),
unidad:String(x.unidad||“pza”),
precio:Number(String(x.precio||“0”).replace(/[,$]/g,””))||0,
proveedor:String(x.proveedor||””),
fecha:String(x.fecha||today()),
notas:String(x.notas||””),
estado:String(x.estado||””),
ciudad:String(x.ciudad||””),
}));
}

// ── HTML helpers ──
function h(tag,attrs,…children) {
const el = document.createElement(tag);
if (attrs) Object.entries(attrs).forEach(([k,v])=>{
if (k===“class”) el.className=v;
else if (k.startsWith(“on”)) el[k.toLowerCase()]=v;
else if (k===“style”&&typeof v===“object”) Object.assign(el.style,v);
else if (k===“checked”&&tag===“input”) el.checked=v;
else if (v!==null&&v!==undefined&&v!==false) el.setAttribute(k,v);
});
children.flat(Infinity).forEach(c=>{ if(c==null||c===false) return; el.appendChild(typeof c===“string”?document.createTextNode(c):c); });
return el;
}
const div  = (a,…c) => h(“div”,a,…c);
const p    = (a,…c) => h(“p”,a,…c);
const span = (a,…c) => h(“span”,a,…c);
const btn  = (a,…c) => h(“button”,a,…c);
const inp  = (a) => h(“input”,a);
const sel  = (a,…c) => h(“select”,a,…c);
const opt  = (v,t,sel) => h(“option”,{value:v,…(sel?{selected:“selected”}:{})},t);
const ta   = (a,…c) => h(“textarea”,a,…c);
const lbl  = (a,…c) => h(“label”,a,…c);

function makeInp(attrs={}) {
return inp({class:“inp”,…attrs});
}
function makeSelect(val,options,onChange) {
const el=sel({class:“inp”,onchange:e=>onChange(e.target.value)});
options.forEach(([v,t])=>el.appendChild(opt(v,t,v===val)));
return el;
}
function makeLabel(text) { return lbl({class:“fl”},text); }

function checkbox(checked) {
return div({class:“checkbox”+(checked?” checked”:””)},checked?span({style:{color:“white”,fontSize:“13px”,fontWeight:“700”,lineHeight:“1”}},“✓”):””);
}

function ageBadge(item) {
const age=getAge(item.fechaSubida,item.fechaActualizacion);
return span({class:“age-badge”,style:{background:age.bg,color:age.color}},age.icon+” “+age.label);
}

function discBadge(d) {
return d?span({class:“disc-badge”,style:{background:d.bg,color:d.color}},d.label):””;
}

// ── Score/filter ──
function score(item,q) {
if(!q) return 1; const ql=q.toLowerCase(); let s=0;
if(item.nombre.toLowerCase().startsWith(ql))s+=10; else if(item.nombre.toLowerCase().includes(ql))s+=6;
if((item.subpartida||””).toLowerCase().includes(ql))s+=4;
if((item.proveedor||””).toLowerCase().includes(ql))s+=2;
if((item.estado||””).toLowerCase().includes(ql))s+=2;
if((item.ciudad||””).toLowerCase().includes(ql))s+=2;
if((item.notas||””).toLowerCase().includes(ql))s+=1;
const d=DISC.find(x=>x.id===item.disciplina);if(d&&d.label.toLowerCase().includes(ql))s+=3;
return s;
}
function ageFilter(item) {
if(S.filterAge===“all”) return true;
const a=getAge(item.fechaSubida,item.fechaActualizacion);
if(S.filterAge===“verde”)    return a.months!==null&&a.months<6;
if(S.filterAge===“amarillo”) return a.months!==null&&a.months>=6&&a.months<12;
if(S.filterAge===“naranja”)  return a.months!==null&&a.months>=12&&a.months<18;
if(S.filterAge===“rojo”)     return a.months!==null&&a.months>=18;
return true;
}
function getFiltered() {
return S.items
.filter(i=>S.filterDisc===“all”||i.disciplina===S.filterDisc)
.filter(ageFilter)
.filter(i=>!S.search||score(i,S.search)>0)
.sort((a,b)=>{
if(S.search) return score(b,S.search)-score(a,S.search);
if(S.sortBy===“precio”) return Number(a.precio)-Number(b.precio);
if(S.sortBy===“precioDesc”) return Number(b.precio)-Number(a.precio);
if(S.sortBy===“fecha”) return (b.fechaSubida||””).localeCompare(a.fechaSubida||””);
if(S.sortBy===“antiguedad”) return (a.fechaActualizacion||a.fechaSubida||””).localeCompare(b.fechaActualizacion||b.fechaSubida||””);
return a.nombre.localeCompare(b.nombre);
});
}

// ── Export CSV ──
function exportCSV() {
if(!S.items.length){showToast(“No hay materiales”,“err”);return;}
const headers=[“Nombre”,“Disciplina”,“Sub-Partida”,“Unidad”,“Precio”,“Proveedor”,“Estado”,“Ciudad”,“F.Cotización”,“F.Subida”,“F.Actualización”,“Notas”];
const rows=S.items.map(i=>[i.nombre,getDisc(i.disciplina)?.label||i.disciplina,i.subpartida||””,i.unidad,Number(i.precio).toFixed(2),i.proveedor||””,i.estado||””,i.ciudad||””,i.fecha||””,i.fechaSubida||””,i.fechaActualizacion||””,i.notas||””]);
const csv=[headers,…rows].map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(”,”)).join(”\n”);
const a=document.createElement(“a”);a.href=“data:text/csv;charset=utf-8,\uFEFF”+encodeURIComponent(csv);a.download=“Precios_”+today()+”.csv”;a.click();
showToast(“Exportado ✓”);
}

// ── Cotización helpers ──
function getEffPct(ci) {
if(S.pctMode===“global”) return Number(S.globalPct)||0;
if(S.pctMode===“individual”) return Number(ci.pct)||0;
return Number(S.cotGroups.find(g=>g.id===ci.groupId)?.pct)||0;
}
function getResumenRows() {
return S.cotItems.map(ci=>{
const item=S.items.find(i=>i.id===ci.itemId);if(!item)return null;
const cant=Number(ci.cantidad)||1,pct=getEffPct(ci),precioU=Number(item.precio)||0;
const subtot=precioU*cant,utilU=precioU*(pct/100),totalU=precioU+utilU,utilTot=utilU*cant,totalTot=totalU*cant;
return{item,ci,cant,pct,precioU,subtot,utilU,totalU,utilTot,totalTot};
}).filter(Boolean);
}
function exportCotCSV() {
const rows=getResumenRows();
const grandSub=rows.reduce((s,r)=>s+r.subtot,0),grandUtil=rows.reduce((s,r)=>s+r.utilTot,0),grandTotal=rows.reduce((s,r)=>s+r.totalTot,0);
const headers=[”#”,“Material”,“Disciplina”,“Unidad”,“Cant.”,“P.Costo”,“Subtotal”,”% Util.”,“Utilidad”,“P.Venta”,“Total”];
const data=rows.map((r,i)=>[i+1,r.item.nombre,getDisc(r.item.disciplina)?.label||r.item.disciplina,r.item.unidad,r.cant,r.precioU.toFixed(2),r.subtot.toFixed(2),r.pct+”%”,r.utilTot.toFixed(2),r.totalU.toFixed(2),r.totalTot.toFixed(2)]);
data.push([]);data.push([””,””,””,””,””,“SUBTOTAL”,grandSub.toFixed(2),””,“UTILIDAD”,“TOTAL VENTA”,grandTotal.toFixed(2)]);
const csv=[headers,…data].map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(”,”)).join(”\n”);
const a=document.createElement(“a”);a.href=“data:text/csv;charset=utf-8,\uFEFF”+encodeURIComponent(csv);a.download=“Cotizacion_”+(S.cotNombre||“Nueva”)+”_”+today()+”.csv”;a.click();
showToast(“Cotización exportada ✓”);
}

// ══════════════════════════════════════════════════════════════════
// RENDER SECTIONS
// ══════════════════════════════════════════════════════════════════

function renderItemCard(item) {
const d=getDisc(item.disciplina);
const age=getAge(item.fechaSubida,item.fechaActualizacion);
const isOld=(age.months||0)>=12;
const card=div({class:“item-card”,style:{border:“1.5px solid “+(isOld?”#FECACA”:”#F1F5F9”)}});

// Main row
const main=div({style:{padding:“14px 16px”,display:“flex”,alignItems:“center”,gap:“12px”,flexWrap:“wrap”}});
if(d) main.appendChild(div({style:{width:“42px”,height:“42px”,borderRadius:“10px”,background:d.bg,display:“flex”,alignItems:“center”,justifyContent:“center”,fontSize:“20px”,flexShrink:“0”}},d.icon));

const info=div({style:{flex:“1”,minWidth:“160px”}});
info.appendChild(p({style:{margin:0,fontWeight:“700”,fontSize:“14px”,color:”#1E293B”}},item.nombre));

const tags=div({style:{display:“flex”,gap:“6px”,marginTop:“3px”,flexWrap:“wrap”,alignItems:“center”}});
if(d) tags.appendChild(discBadge(d));
if(item.subpartida) tags.appendChild(span({style:{fontSize:“11px”,color:”#64748B”}},”· “+item.subpartida));
if(item.proveedor) tags.appendChild(span({style:{fontSize:“11px”,color:”#94A3B8”}},”· “+item.proveedor));
info.appendChild(tags);

const tags2=div({style:{display:“flex”,gap:“8px”,marginTop:“4px”,flexWrap:“wrap”,alignItems:“center”}});
const loc=[item.ciudad,item.estado].filter(Boolean).join(”, “);
if(loc) tags2.appendChild(span({class:“loc-tag”},“📍 “+loc));
tags2.appendChild(ageBadge(item));
if(item.fechaSubida) tags2.appendChild(span({class:“date-tag”},“Subido: “+item.fechaSubida));
if(item.fechaActualizacion) tags2.appendChild(span({class:“upd-tag”},“Actualizado: “+item.fechaActualizacion));
info.appendChild(tags2);
if(item.notas) info.appendChild(p({style:{margin:“3px 0 0”,fontSize:“12px”,color:”#94A3B8”}},item.notas));
main.appendChild(info);
